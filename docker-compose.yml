services:
  radius-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-radius}
      MYSQL_USER: ${MYSQL_USER:-radius}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ../files/mysql:/var/lib/mysql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  freeradius:
    build: ./freeradius
    restart: unless-stopped
    depends_on:
      radius-db:
        condition: service_healthy
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      - RADIUS_DB_HOST=radius-db
      - RADIUS_DB_PORT=3306
      - RADIUS_DB_USER=${MYSQL_USER:-radius}
      - RADIUS_DB_PASS=${MYSQL_PASSWORD}
      - RADIUS_DB_NAME=${MYSQL_DATABASE:-radius}
    networks:
      - dokploy-network

  daloradius:
    build:
      context: https://github.com/lirantal/daloradius.git#master
    restart: unless-stopped
    depends_on:
      radius-db:
        condition: service_healthy
      freeradius:
        condition: service_started
    expose:
      - "80"
      - "8000"
    environment:
      - MYSQL_HOST=radius-db
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-radius}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-radius}
      - DEFAULT_FREERADIUS_SERVER=freeradius
      - DEFAULT_CLIENT_SECRET=${DEFAULT_CLIENT_SECRET}
      # operators UI binds to 127.0.0.1 by default — expose to the Docker
      # network so Dokploy/Traefik can route a domain to it
      - DALORADIUS_OPERATORS_BIND=0.0.0.0:8000
    volumes:
      - ../files/daloradius:/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
